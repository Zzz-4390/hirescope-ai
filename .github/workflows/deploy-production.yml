name: Deploy production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: Full 40-character commit SHA from main to deploy
        required: true
        type: string

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  validate:
    name: Validate immutable deployment
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deploy_sha: ${{ steps.validate.outputs.deploy_sha }}
      api_image: ${{ steps.images.outputs.api_image }}
      api_digest: ${{ steps.images.outputs.api_digest }}
      worker_image: ${{ steps.images.outputs.worker_image }}
      worker_digest: ${{ steps.images.outputs.worker_digest }}
      web_image: ${{ steps.images.outputs.web_image }}
      web_digest: ${{ steps.images.outputs.web_digest }}
      migrate_image: ${{ steps.images.outputs.migrate_image }}
      migrate_digest: ${{ steps.images.outputs.migrate_digest }}

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Validate deployment SHA and CI provenance
        id: validate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_DEPLOY_SHA: ${{ inputs.deploy_sha }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          RUN_EVENT: ${{ github.event.workflow_run.event }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -Eeuo pipefail
          git fetch --force --prune origin main
          remote_main_tip="$(git rev-parse origin/main)"

          if [[ "$EVENT_NAME" == workflow_run ]]; then
            [[ "$RUN_CONCLUSION" == success ]]
            [[ "$RUN_EVENT" == push ]]
            [[ "$RUN_HEAD_BRANCH" == main ]]
            [[ "$RUN_HEAD_REPOSITORY" == "$GITHUB_REPOSITORY" ]]
            deploy_sha="$RUN_HEAD_SHA"
            [[ "$deploy_sha" == "$remote_main_tip" ]] || {
              echo "Refusing stale CI rerun: deployment SHA is not the current remote main tip." >&2
              exit 1
            }
          else
            deploy_sha="${MANUAL_DEPLOY_SHA,,}"
          fi

          [[ "$deploy_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "deploy_sha must be a full 40-character commit SHA." >&2
            exit 1
          }
          git cat-file -e "${deploy_sha}^{commit}"
          git merge-base --is-ancestor "$deploy_sha" origin/main || {
            echo "deploy_sha is not contained in main." >&2
            exit 1
          }

          if [[ "$EVENT_NAME" == workflow_dispatch ]]; then
            successful_runs="$(gh api -X GET \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
              -f branch=main -f event=push -f status=success -f head_sha="$deploy_sha" -f per_page=100)"
            jq -e --arg sha "$deploy_sha" --arg repo "$GITHUB_REPOSITORY" \
              '.workflow_runs | any(.head_sha == $sha and .head_branch == "main" and .event == "push" and .conclusion == "success" and .head_repository.full_name == $repo)' \
              <<< "$successful_runs" >/dev/null || {
                echo "No successful push-main CI run exists for deploy_sha." >&2
                exit 1
              }
          fi

          printf 'deploy_sha=%s\n' "$deploy_sha" >> "$GITHUB_OUTPUT"
          printf 'Validated deploy SHA: `%s`\n' "$deploy_sha" >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Require all immutable images and record registry digests
        id: images
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.validate.outputs.deploy_sha }}
        run: |
          set -Eeuo pipefail
          repository="${GITHUB_REPOSITORY,,}"
          printf '### Registry image contract\n\n' >> "$GITHUB_STEP_SUMMARY"
          for service in api worker web migrate; do
            image="ghcr.io/${repository}/${service}:${DEPLOY_SHA}"
            manifest_json="$(docker buildx imagetools inspect "$image" --format '{{json .Manifest}}')"
            digest="$(jq -er '.digest // .Digest' <<< "$manifest_json")"
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
            printf '%s_image=%s\n%s_digest=%s\n' "$service" "$image" "$service" "$digest" >> "$GITHUB_OUTPUT"
            printf -- '- `%s@%s`\n' "$image" "$digest" >> "$GITHUB_STEP_SUMMARY"
          done

  deploy:
    name: Deploy exact production images
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      DEPLOY_SHA: ${{ needs.validate.outputs.deploy_sha }}
      API_IMAGE: ${{ needs.validate.outputs.api_image }}
      API_DIGEST: ${{ needs.validate.outputs.api_digest }}
      WORKER_IMAGE: ${{ needs.validate.outputs.worker_image }}
      WORKER_DIGEST: ${{ needs.validate.outputs.worker_digest }}
      WEB_IMAGE: ${{ needs.validate.outputs.web_image }}
      WEB_DIGEST: ${{ needs.validate.outputs.web_digest }}
      MIGRATE_IMAGE: ${{ needs.validate.outputs.migrate_image }}
      MIGRATE_DIGEST: ${{ needs.validate.outputs.migrate_digest }}
      PROD_WEB_ORIGIN: ${{ vars.PROD_WEB_ORIGIN || format('http://{0}:3000', secrets.PROD_HOST) }}

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.deploy_sha }}

      - name: Configure SSH
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          umask 077
          install -d -m 700 "$RUNNER_TEMP/hirescope-ssh"
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/hirescope-ssh/deploy_key"
          printf '%s\n' "$PROD_KNOWN_HOSTS" > "$RUNNER_TEMP/hirescope-ssh/known_hosts"
          {
            printf 'Host production\n'
            printf '  HostName %s\n' "$PROD_HOST"
            printf '  User %s\n' "$PROD_USER"
            printf '  Port %s\n' "$PROD_PORT"
            printf '  IdentityFile %s\n' "$RUNNER_TEMP/hirescope-ssh/deploy_key"
            printf '  UserKnownHostsFile %s\n' "$RUNNER_TEMP/hirescope-ssh/known_hosts"
            printf '  StrictHostKeyChecking yes\n'
            printf '  BatchMode yes\n'
            printf '  IdentitiesOnly yes\n'
            printf '  LogLevel ERROR\n'
          } > "$RUNNER_TEMP/hirescope-ssh/config"
          chmod 600 "$RUNNER_TEMP/hirescope-ssh/deploy_key"
          test -s "$RUNNER_TEMP/hirescope-ssh/known_hosts"
          ssh-keygen -y -f "$RUNNER_TEMP/hirescope-ssh/deploy_key" >/dev/null

      - name: Install exact deployment files
        shell: bash
        run: |
          set -Eeuo pipefail
          ssh -F "$RUNNER_TEMP/hirescope-ssh/config" production 'install -d -m 700 /opt/hirescope/.deploy'
          scp -F "$RUNNER_TEMP/hirescope-ssh/config" docker-compose.prod.yml \
            "production:/opt/hirescope/.deploy/compose-${DEPLOY_SHA}.yml"
          scp -F "$RUNNER_TEMP/hirescope-ssh/config" .github/scripts/deploy-production.sh \
            production:/opt/hirescope/.deploy/deploy-production.sh

      - name: Deploy, migrate, and verify internal runtime identity
        id: deploy
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          public_origin_base64="$(printf '%s' "$PROD_WEB_ORIGIN" | base64 -w 0)"
          printf '%s\n' "$GHCR_TOKEN" | ssh -F "$RUNNER_TEMP/hirescope-ssh/config" production \
            "bash /opt/hirescope/.deploy/deploy-production.sh deploy \
              '$DEPLOY_SHA' '$GITHUB_ACTOR' '$public_origin_base64' \
              '$API_IMAGE' '$API_DIGEST' '$WORKER_IMAGE' '$WORKER_DIGEST' \
              '$WEB_IMAGE' '$WEB_DIGEST' '$MIGRATE_IMAGE' '$MIGRATE_DIGEST'"

      - name: Verify public production version endpoints
        id: external
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ "$PROD_WEB_ORIGIN" =~ ^https?://[^/]+$ ]]
          nonce="${DEPLOY_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          headers="$RUNNER_TEMP/version-headers"
          body="$RUNNER_TEMP/version-body"

          curl -fsS --retry 12 --retry-delay 5 --retry-connrefused --max-time 10 \
            -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' -D "$headers" -o "$body" \
            "${PROD_WEB_ORIGIN}/_version?deploy_sha=${DEPLOY_SHA}&nonce=${nonce}"
          grep -Eiq '^cache-control:.*no-store' "$headers"
          grep -Eiq "^x-app-commit-sha: *${DEPLOY_SHA}" "$headers"
          grep -Eiq "^x-next-build-id: *${DEPLOY_SHA}" "$headers"
          jq -e --arg sha "$DEPLOY_SHA" '.commitSha == $sha and .nextBuildId == $sha' "$body" >/dev/null

          curl -fsS --retry 12 --retry-delay 5 --retry-connrefused --max-time 10 \
            -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' -D "$headers" -o "$body" \
            "${PROD_WEB_ORIGIN}/api/v1/version?deploy_sha=${DEPLOY_SHA}&nonce=${nonce}"
          grep -Eiq '^cache-control:.*no-store' "$headers"
          jq -e --arg sha "$DEPLOY_SHA" '.commitSha == $sha' "$body" >/dev/null
          printf 'Public Web and API version checks passed for `%s`.\n' "$DEPLOY_SHA" >> "$GITHUB_STEP_SUMMARY"

      - name: Record successful SHA and digests
        shell: bash
        run: |
          set -Eeuo pipefail
          ssh -F "$RUNNER_TEMP/hirescope-ssh/config" production \
            "bash /opt/hirescope/.deploy/deploy-production.sh record-success \
              '$DEPLOY_SHA' '$API_IMAGE' '$API_DIGEST' '$WORKER_IMAGE' '$WORKER_DIGEST' \
              '$WEB_IMAGE' '$WEB_DIGEST' '$MIGRATE_IMAGE' '$MIGRATE_DIGEST'"

      - name: Roll back application containers after external verification failure
        if: failure() && steps.deploy.outcome == 'success'
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          printf '%s\n' "$GHCR_TOKEN" | ssh -F "$RUNNER_TEMP/hirescope-ssh/config" production \
            "bash /opt/hirescope/.deploy/deploy-production.sh rollback '$GITHUB_ACTOR'"

      - name: Remove SSH files
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/hirescope-ssh"
