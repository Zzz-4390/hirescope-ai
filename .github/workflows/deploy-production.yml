name: Deploy production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    env:
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      PROD_WEB_ORIGIN: ${{ vars.PROD_WEB_ORIGIN || format('http://{0}:3000', secrets.PROD_HOST) }}

    steps:
      - name: Configure SSH
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          umask 077

          install -d -m 700 "$RUNNER_TEMP/hirescope-ssh"
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/hirescope-ssh/deploy_key"
          printf '%s\n' "$PROD_KNOWN_HOSTS" > "$RUNNER_TEMP/hirescope-ssh/known_hosts"
          {
            printf 'Host production\n'
            printf '  HostName %s\n' "$PROD_HOST"
            printf '  User %s\n' "$PROD_USER"
            printf '  Port %s\n' "$PROD_PORT"
            printf '  IdentityFile %s\n' "$RUNNER_TEMP/hirescope-ssh/deploy_key"
            printf '  UserKnownHostsFile %s\n' "$RUNNER_TEMP/hirescope-ssh/known_hosts"
            printf '  StrictHostKeyChecking yes\n'
            printf '  BatchMode yes\n'
            printf '  IdentitiesOnly yes\n'
            printf '  LogLevel ERROR\n'
          } > "$RUNNER_TEMP/hirescope-ssh/config"

          chmod 600 "$RUNNER_TEMP/hirescope-ssh/deploy_key"
          test -s "$RUNNER_TEMP/hirescope-ssh/known_hosts"
          ssh-keygen -y -f "$RUNNER_TEMP/hirescope-ssh/deploy_key" > /dev/null

      - name: Deploy exact commit
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ ! "$DEPLOY_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Invalid deployment commit SHA."
            exit 1
          fi

          web_origin_base64="$(printf '%s' "$PROD_WEB_ORIGIN" | base64 -w 0)"
          ssh -F "$RUNNER_TEMP/hirescope-ssh/config" production \
            "bash -se -- '$DEPLOY_SHA' '$web_origin_base64'" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          target_sha="$1"
          public_web_origin="$(printf '%s' "$2" | base64 -d)"
          cd /opt/hirescope

          if [[ ! "$public_web_origin" =~ ^https?://[^/]+$ ]]; then
            echo "Invalid production Web origin."
            exit 1
          fi

          export CORS_ALLOWED_ORIGINS="$public_web_origin"

          compose=(docker compose --env-file .env.production -f docker-compose.prod.yml)

          output_failure_logs() {
            local exit_status=$?
            trap - EXIT

            if (( exit_status != 0 )); then
              set +e
              echo "Deployment failed; collecting recent service logs."

              for service in web api worker postgres redis; do
                echo "::group::${service} logs"
                "${compose[@]}" logs --no-color --tail=200 "$service"
                echo "::endgroup::"
              done
            fi

            exit "$exit_status"
          }
          trap output_failure_logs EXIT

          git fetch --prune origin main
          git cat-file -e "${target_sha}^{commit}"

          resolved_sha="$(git rev-parse "${target_sha}^{commit}")"
          if [[ "$resolved_sha" != "$target_sha" ]]; then
            echo "Fetched commit does not match the requested deployment SHA."
            exit 1
          fi

          if ! git merge-base --is-ancestor "$target_sha" origin/main; then
            echo "Requested deployment commit is not on origin/main."
            exit 1
          fi

          git reset --hard "$target_sha"
          "${compose[@]}" config --quiet

          export COMPOSE_PARALLEL_LIMIT=1
          "${compose[@]}" --profile migration build migrate api worker web
          "${compose[@]}" --profile migration run --rm migrate
          "${compose[@]}" up -d --remove-orphans --force-recreate api worker web

          wait_for_services() {
            local deadline=$((SECONDS + 300))
            local pending=(postgres redis api worker web)

            while (( ${#pending[@]} > 0 && SECONDS < deadline )); do
              local remaining=()
              local service container_id status health

              for service in "${pending[@]}"; do
                container_id="$("${compose[@]}" ps -q "$service")"
                if [[ -z "$container_id" ]]; then
                  remaining+=("$service")
                  continue
                fi

                status="$(docker inspect --format '{{.State.Status}}' "$container_id" 2>/dev/null || true)"
                health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id" 2>/dev/null || true)"

                if [[ "$status" == "running" && "$health" == "healthy" ]]; then
                  echo "$service is $status/$health."
                  continue
                fi

                if [[ "$status" == "exited" || "$status" == "dead" || "$health" == "unhealthy" ]]; then
                  echo "$service failed readiness: status=${status:-missing}, health=${health:-missing}."
                  return 1
                fi

                remaining+=("$service")
              done

              pending=("${remaining[@]}")
              if (( ${#pending[@]} > 0 )); then
                sleep 5
              fi
            done

            if (( ${#pending[@]} > 0 )); then
              echo "Timed out waiting for services: ${pending[*]}."
              return 1
            fi
          }

          wait_for_services
          curl -fsS --retry 12 --retry-delay 5 --retry-connrefused --max-time 10 \
            http://127.0.0.1:3000/ > /dev/null

          logout_status="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            -X POST -H "Origin: $public_web_origin" \
            http://127.0.0.1:3000/api/v1/auth/logout)"
          if [[ "$logout_status" != "204" ]]; then
            echo "Production auth origin smoke failed with HTTP $logout_status."
            exit 1
          fi

          trap - EXIT
          echo "Production deployment completed for ${target_sha}."
          REMOTE_SCRIPT

      - name: Remove SSH files
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/hirescope-ssh"
