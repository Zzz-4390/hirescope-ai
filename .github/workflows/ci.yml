name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-validation:
    name: Full validation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      DATABASE_URL: ${{ secrets.CI_TEST_DATABASE_URL }}
      TEST_DATABASE_URL: ${{ secrets.CI_TEST_DATABASE_URL }}
      REDIS_URL: ${{ secrets.CI_TEST_REDIS_URL }}
      TEST_REDIS_URL: ${{ secrets.CI_TEST_REDIS_URL }}
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
      AUTH_REFRESH_HASH_SECRET: ${{ secrets.CI_AUTH_REFRESH_HASH_SECRET }}
      AUTH_DUMMY_PASSWORD_HASH: ${{ secrets.CI_AUTH_DUMMY_PASSWORD_HASH }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hirescope_test
          POSTGRES_USER: hirescope
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hirescope -d hirescope_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm 11
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Prepare test environment
        shell: bash
        run: |
          umask 077
          {
            printf 'NODE_ENV=test\n'
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'TEST_DATABASE_URL=%s\n' "$TEST_DATABASE_URL"
            printf 'REDIS_URL=%s\n' "$REDIS_URL"
            printf 'TEST_REDIS_URL=%s\n' "$TEST_REDIS_URL"
            printf 'STORAGE_ROOT=storage\n'
            printf 'TASK_QUEUE_NAME=hirescope-tasks\n'
            printf 'TASK_RECOVERY_INTERVAL_MS=30000\n'
            printf 'TASK_RECOVERY_BATCH_SIZE=100\n'
            printf 'ZIP_MAX_BYTES=52428800\n'
            printf 'ZIP_MAX_FILES=5000\n'
            printf 'ZIP_MAX_SINGLE_FILE_BYTES=2097152\n'
            printf 'ZIP_MAX_EXTRACTED_BYTES=209715200\n'
            printf 'ZIP_MAX_DEPTH=30\n'
            printf 'ANALYSIS_MAX_TEXT_READ_BYTES=1048576\n'
            printf 'OSS_ACCESS_KEY_ID=test-access-key-id\n'
            printf 'OSS_ACCESS_KEY_SECRET=test-access-key-secret-value\n'
            printf 'OSS_BUCKET=hirescope-test-private\n'
            printf 'OSS_REGION=oss-cn-hangzhou\n'
            printf 'OSS_SIGNED_URL_TTL_SECONDS=900\n'
            printf 'API_HOST=127.0.0.1\n'
            printf 'API_PORT=3001\n'
            printf 'CORS_ALLOWED_ORIGINS=https://localhost:3000\n'
            printf 'TRUST_PROXY_HOPS=0\n'
            printf 'JWT_ACCESS_SECRET=%s\n' "$JWT_ACCESS_SECRET"
            printf 'JWT_ACCESS_TTL_SECONDS=900\n'
            printf 'JWT_ISSUER=hirescope-api\n'
            printf 'JWT_AUDIENCE=hirescope-web\n'
            printf 'AUTH_REFRESH_HASH_SECRET=%s\n' "$AUTH_REFRESH_HASH_SECRET"
            printf 'AUTH_REFRESH_TTL_SECONDS=2592000\n'
            printf 'AUTH_COOKIE_SECURE=true\n'
            printf 'AUTH_COOKIE_NAME=__Secure-hirescope_refresh\n'
            printf 'AUTH_DUMMY_PASSWORD_HASH=%s\n' "$AUTH_DUMMY_PASSWORD_HASH"
            printf 'AUTH_ARGON2_MEMORY_KIB=19456\n'
            printf 'AUTH_ARGON2_TIME_COST=2\n'
            printf 'AUTH_ARGON2_PARALLELISM=1\n'
            printf 'AUTH_REGISTER_WINDOW_SECONDS=3600\n'
            printf 'AUTH_REGISTER_MAX_REQUESTS=5\n'
            printf 'AUTH_LOGIN_WINDOW_SECONDS=900\n'
            printf 'AUTH_LOGIN_MAX_REQUESTS=10\n'
            printf 'AUTH_REFRESH_WINDOW_SECONDS=300\n'
            printf 'AUTH_REFRESH_MAX_REQUESTS=30\n'
          } > .env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate immutable deployment contracts
        run: node .github/scripts/validate-deployment-contract.mjs

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Shared Types tests
        run: pnpm --filter @hirescope/shared-types test

      - name: Web lint
        run: pnpm --filter @hirescope/web lint

      - name: Web typecheck
        run: pnpm --filter @hirescope/web typecheck

      - name: Web tests
        run: pnpm --filter @hirescope/web test

      - name: Web build
        run: pnpm --filter @hirescope/web build

      - name: API typecheck
        run: pnpm --filter @hirescope/api typecheck

      - name: API tests
        run: pnpm --filter @hirescope/api test

      - name: API build
        run: pnpm --filter @hirescope/api build

      - name: API E2E tests
        run: pnpm --filter @hirescope/api test:e2e

      - name: Worker typecheck
        run: pnpm --filter @hirescope/worker typecheck

      - name: Worker tests
        run: pnpm --filter @hirescope/worker test

      - name: Worker build
        run: pnpm --filter @hirescope/worker build

      - name: Worker integration tests
        run: pnpm --filter @hirescope/worker test:integration

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser E2E tests
        env:
          AUTH_COOKIE_SECURE: "false"
        run: pnpm test:e2e

      - name: Database constraint tests
        run: pnpm db:test

      - name: Remove test artifacts
        if: always()
        shell: bash
        run: rm -rf .env storage

  publish-images:
    name: Publish ${{ matrix.target }} image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: full-validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [api, worker, web, migrate]

    steps:
      - name: Checkout validated commit
        uses: actions/checkout@v7

      - name: Resolve immutable image references
        id: image
        shell: bash
        env:
          ACR_PUBLIC_REGISTRY: ${{ vars.ACR_PUBLIC_REGISTRY }}
          ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
        run: |
          set -Eeuo pipefail
          repository="${GITHUB_REPOSITORY,,}"
          [[ "$ACR_PUBLIC_REGISTRY" =~ ^[a-z0-9.-]+(:[0-9]+)?$ ]] || {
            echo "ACR_PUBLIC_REGISTRY must be the exact public Registry domain without a scheme or path." >&2
            exit 1
          }
          [[ "$ACR_NAMESPACE" =~ ^[a-z0-9]+([._-][a-z0-9]+)*$ ]] || {
            echo "ACR_NAMESPACE is invalid." >&2
            exit 1
          }
          printf 'ghcr=ghcr.io/%s/%s\n' "$repository" "${{ matrix.target }}" >> "$GITHUB_OUTPUT"
          printf 'acr=%s/%s/%s\n' "$ACR_PUBLIC_REGISTRY" "$ACR_NAMESPACE" "${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Hangzhou ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.ACR_PUBLIC_REGISTRY }}
          username: ${{ secrets.ACR_PUSH_USERNAME }}
          password: ${{ secrets.ACR_PUSH_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build once and push immutable image to ACR and GHCR
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ steps.image.outputs.acr }}:${{ github.sha }}
            ${{ steps.image.outputs.ghcr }}:${{ github.sha }}
          labels: org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            APP_COMMIT_SHA=${{ github.sha }}
            API_ORIGIN=http://api:3001
            NODE_MAX_OLD_SPACE_SIZE=1536
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Record image digest
        shell: bash
        env:
          ACR_IMAGE: ${{ steps.image.outputs.acr }}
          GHCR_IMAGE: ${{ steps.image.outputs.ghcr }}
          IMAGE_TARGET: ${{ matrix.target }}
        run: |
          set -Eeuo pipefail
          acr_manifest="$(docker buildx imagetools inspect "$ACR_IMAGE:$GITHUB_SHA" --format '{{json .Manifest}}')"
          ghcr_manifest="$(docker buildx imagetools inspect "$GHCR_IMAGE:$GITHUB_SHA" --format '{{json .Manifest}}')"
          acr_digest="$(jq -er '.digest // .Digest' <<< "$acr_manifest")"
          ghcr_digest="$(jq -er '.digest // .Digest' <<< "$ghcr_manifest")"
          [[ "$acr_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$ghcr_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          {
            printf '%s_acr=%s@%s\n' "$IMAGE_TARGET" "$ACR_IMAGE" "$acr_digest"
            printf '%s_ghcr=%s@%s\n' "$IMAGE_TARGET" "$GHCR_IMAGE" "$ghcr_digest"
          } | tee "${IMAGE_TARGET}-digest.txt"
          printf '### %s image\n\n- Production ACR: `%s:%s@%s`\n- Backup GHCR: `%s:%s@%s`\n' \
            "$IMAGE_TARGET" "$ACR_IMAGE" "$GITHUB_SHA" "$acr_digest" \
            "$GHCR_IMAGE" "$GITHUB_SHA" "$ghcr_digest" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image digest record
        uses: actions/upload-artifact@v7
        with:
          name: image-digest-${{ matrix.target }}
          path: ${{ matrix.target }}-digest.txt
          retention-days: 90

  record-image-digests:
    name: Record ACR and GHCR image digests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: publish-images
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download digest records
        uses: actions/download-artifact@v8
        with:
          pattern: image-digest-*
          path: image-digests
          merge-multiple: true

      - name: Validate and summarize all image digests
        shell: bash
        env:
          ACR_PUBLIC_REGISTRY: ${{ vars.ACR_PUBLIC_REGISTRY }}
          ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
        run: |
          set -Eeuo pipefail
          repository="${GITHUB_REPOSITORY,,}"
          printf '# ACR production and GHCR backup image digests for `%s`\n\n' "$GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          for service in api worker web migrate; do
            record="image-digests/${service}-digest.txt"
            test -s "$record"
            grep -Eq "^${service}_acr=${ACR_PUBLIC_REGISTRY}/${ACR_NAMESPACE}/${service}@sha256:[0-9a-f]{64}$" "$record"
            grep -Eq "^${service}_ghcr=ghcr\.io/${repository}/${service}@sha256:[0-9a-f]{64}$" "$record"
            while IFS= read -r digest_record; do
              printf -- '- `%s`\n' "$digest_record" >> "$GITHUB_STEP_SUMMARY"
            done < "$record"
          done

      - name: Upload combined digest record
        uses: actions/upload-artifact@v7
        with:
          name: production-image-digests-${{ github.sha }}
          path: image-digests/*-digest.txt
          retention-days: 90
